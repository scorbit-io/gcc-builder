# Musl-only platforms (Debian bookworm-slim sysroots): armhf, armel, arm64 — builder-musl / gcc-builder-musl.
# Format matches platforms.conf.

# ARMv7 hard-float + musl (fully static–oriented builder)
musl-armhf|arm-linux-musleabihf|sysroot-musl-armhf|linux/arm/v7|arm32v7/debian:bookworm-slim|sysroots/Dockerfile.debian-musl-armhf|arm|-march=armv7-a -mfpu=vfpv3 -mfloat-abi=hard

# ARMv5 soft-float + musl (armel), Debian arm32v5 bookworm
musl-armel|arm-linux-musleabi|sysroot-musl-armel|linux/arm/v5|arm32v5/debian:bookworm-slim|sysroots/Dockerfile.debian-musl-armel|arm|-march=armv5te -mfloat-abi=soft

# AArch64 + musl, Debian arm64v8 bookworm
musl-arm64|aarch64-linux-musl|sysroot-musl-arm64|linux/arm64|arm64v8/debian:bookworm-slim|sysroots/Dockerfile.debian-musl-arm64|aarch64|
