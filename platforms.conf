# Platform Configuration for Multi-Architecture GCC 16 Toolchain
# This file defines all supported architectures and their properties

# Format: ARCH_NAME|TARGET_TRIPLET|SYSROOT_NAME|DOCKER_PLATFORM|BASE_IMAGE|SYSROOT_DOCKERFILE|CMAKE_PROCESSOR|CMAKE_FLAGS
# All fields are required except CMAKE_FLAGS (can be empty)
# BASE_IMAGE           – used to build the GCC toolchain (old glibc for max compatibility)
# SYSROOT_DOCKERFILE   – Dockerfile under sysroots/ for the target sysroot used in the builder image

# ARMhf (toolchain: Ubuntu 12.04 / glibc 2.15, target sysroot: armv7)
armhf|arm-linux-gnueabihf|sysroot-armhf|linux/arm/v7|dilshodm/ubuntu:12.04|sysroots/Dockerfile.ubuntu12|arm|-march=armv7-a -mfpu=neon-vfpv4 -mfloat-abi=hard -Wno-psabi

# AMD64 (toolchain: Ubuntu 14.04 / glibc 2.19, target sysroot: ubuntu18)
amd64|x86_64-linux-gnu|sysroot-amd64|linux/amd64|ubuntu:14.04|sysroots/Dockerfile.ubuntu18|x86_64|

# ARM64 (toolchain: Ubuntu 14.04 / glibc 2.19, target sysroot: ubuntu18)
arm64|aarch64-linux-gnu|sysroot-arm64|linux/arm64|ubuntu:14.04|sysroots/Dockerfile.ubuntu18|aarch64|
