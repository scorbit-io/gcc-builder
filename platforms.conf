# Platform Configuration for Multi-Architecture GCC 15 Toolchain
# This file defines all supported architectures and their properties

# Format: ARCH_NAME|TARGET_TRIPLET|SYSROOT_NAME|DOCKER_PLATFORM|BASE_IMAGE|BUILDER_BASE_IMAGE|CMAKE_PROCESSOR|CMAKE_FLAGS
# All fields are required except CMAKE_FLAGS (can be empty)
# BASE_IMAGE        – used to build the GCC toolchain (old glibc for max compatibility)
# BUILDER_BASE_IMAGE – used as the sysroot in the builder image (arbitrary target platform)

# ARMhf (toolchain: Ubuntu 12.04 / glibc 2.15, builder: Ubuntu 12.04)
armhf|arm-linux-gnueabihf|sysroot-armhf|linux/arm/v7|dilshodm/ubuntu:12.04|dilshodm/ubuntu:12.04|arm|-march=armv7-a -mfpu=neon-vfpv4 -mfloat-abi=hard

# AMD64 (toolchain: Ubuntu 14.04 / glibc 2.19, builder: Ubuntu 20.04)
amd64|x86_64-linux-gnu|sysroot-amd64|linux/amd64|ubuntu:14.04|ubuntu:20.04|x86_64|

# ARM64 (toolchain: Ubuntu 14.04 / glibc 2.19, builder: Ubuntu 20.04)
arm64|aarch64-linux-gnu|sysroot-arm64|linux/arm64|ubuntu:14.04|ubuntu:20.04|aarch64|

